<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wincontrol · Acceso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg: #020617;
      --panel: #0b1220;
      --panel-2: #0e1626;
      --border: #162032;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --muted2: #64748b;
      --blue: #2563eb;
      --emerald: #10b981;
      --amber: #f59e0b;
      --orange: #f97316;
      --red: #dc2626;
      --violet: #8b5cf6;
      --radius: 16px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --shadow2: 0 6px 18px rgba(0,0,0,.35);
    }

    body.light {
      --bg: #f6f5f2;
      --panel: #ffffff;
      --panel-2: #f4f3ef;
      --border: #e4e2da;
      --text: #0a0a0a;
      --muted: #6b6a63;
      --muted2: #98968d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(37,99,235,.18), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(139,92,246,.10), transparent 55%),
        radial-gradient(600px 400px at 50% 100%, rgba(37,99,235,.06), transparent 60%),
        var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      padding-top: max(40px, calc(env(safe-area-inset-top, 0px) + 24px));
      padding-bottom: max(40px, calc(env(safe-area-inset-bottom, 0px) + 24px));
      position: relative;
      overflow: hidden;
      transition: background-color .2s ease, color .2s ease;
    }
    body.light {
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(37,99,235,.06), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(139,92,246,.04), transparent 55%),
        radial-gradient(600px 400px at 50% 100%, rgba(37,99,235,.03), transparent 60%),
        var(--bg);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    body.light::before {
      background-image:
        linear-gradient(rgba(37,99,235,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,.03) 1px, transparent 1px);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(37,99,235,.12);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(139,92,246,.10);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: rgba(16,185,129,.06);
      top: 50%; left: 60%;
      animation-delay: -8s;
    }
    body.light .orb-1 { background: rgba(37,99,235,.06); }
    body.light .orb-2 { background: rgba(139,92,246,.05); }
    body.light .orb-3 { background: rgba(16,185,129,.04); }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(30px, 20px) scale(1.05); }
    }

    .theme-toggle {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 20px);
      right: calc(env(safe-area-inset-right, 0px) + 20px);
      z-index: 20;
      width: 52px;
      height: 28px;
      padding: 3px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(2,6,23,.55);
      cursor: pointer;
      transition: border-color .2s ease, background-color .2s ease;
    }
    .theme-toggle:hover { border-color: rgba(37,99,235,.4); }
    body.light .theme-toggle { background: var(--panel-2); border-color: var(--border); }
    body.light .theme-toggle:hover { border-color: rgba(37,99,235,.35); }

    .theme-toggle-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--blue), #1d4ed8);
      box-shadow: 0 4px 10px rgba(37,99,235,.4);
      display: grid;
      place-items: center;
      position: relative;
      transform: translateX(0);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      color: #fff;
    }
    .theme-toggle[aria-checked="true"] .theme-toggle-thumb {
      transform: translateX(24px);
    }

    .theme-toggle-thumb svg {
      width: 12px;
      height: 12px;
      position: absolute;
      opacity: 0;
      transition: opacity .15s ease;
    }
    .theme-toggle[aria-checked="false"] .icon-moon { opacity: 1; }
    .theme-toggle[aria-checked="true"] .icon-sun { opacity: 1; }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      animation: fadeDown .6s ease both;
    }

    .logo {
      width: 48px; height: 48px;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--blue), #1b3faa);
      display: grid;
      place-items: center;
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      box-shadow: 0 10px 30px rgba(37,99,235,.35), 0 0 0 1px rgba(37,99,235,.25);
      flex-shrink: 0;
    }

    .brand-text .name {
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: -.03em;
      color: #fff;
    }
    body.light .brand-text .name { color: var(--text); }
    .brand-text .tag {
      font-size: 12px;
      color: var(--muted2);
      margin-top: 2px;
      font-weight: 500;
    }

    .card {
        width: 100%;
        max-width: 440px;
        background: linear-gradient(180deg, rgba(11,18,32,.96), rgba(8,14,28,.92));
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 24px;
        box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(37,99,235,.06) inset;
        display: flex;
        flex-direction: column;
        max-height: 80vh;
        overflow: hidden;
        animation: fadeUp .6s ease both .1s;
        position: relative;
        z-index: 1;
    }
    body.light .card {
      background: #fff;
      border-color: var(--border);
      box-shadow: 0 20px 50px rgba(15,23,42,.10), 0 0 0 1px rgba(37,99,235,.04) inset;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    body.light .tabs { border-bottom-color: var(--border); }

    .tab {
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 14px;
      color: var(--muted2);
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: .2s ease;
      position: relative;
      letter-spacing: .01em;
    }
    .tab::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 2px;
      background: var(--blue);
      border-radius: 999px;
      transform: scaleX(0);
      transition: transform .25s ease;
    }
    .tab.active { color: #fff; }
    body.light .tab.active { color: var(--text); }
    .tab.active::after { transform: scaleX(1); }
    .tab:hover:not(.active) {
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }
    body.light .tab:hover:not(.active) { background: rgba(15,23,42,.03); }

    .form-body {
        padding: 24px;
        overflow-y: auto;
        flex: 1;
    }
    .form-body::-webkit-scrollbar { width: 6px; }
    .form-body::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
    }
    body.light .form-body::-webkit-scrollbar-thumb { background: rgba(15,23,42,.15); }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    body.light .form-title { color: var(--text); }
    .form-subtitle {
      font-size: 13px;
      color: var(--muted2);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    #panel-register .field { margin-bottom: 10px; }
    #panel-register .role-selector { margin-bottom: 16px; }
    #panel-register .form-subtitle { margin-bottom: 16px; }

    .role-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .role-btn {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(2,6,23,.45);
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      transition: .2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      position: relative;
      overflow: hidden;
    }
    body.light .role-btn { border-color: var(--border); background: var(--panel-2); }
    .role-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .role-btn.admin::before {
      background: radial-gradient(circle at center, rgba(37,99,235,.15), transparent 70%);
    }
    .role-btn.comercial::before {
      background: radial-gradient(circle at center, rgba(139,92,246,.15), transparent 70%);
    }
    .role-btn:hover::before,
    .role-btn.selected::before { opacity: 1; }

    .role-btn.admin.selected,
    .role-btn.admin:hover { border-color: rgba(37,99,235,.5); color: #fff; }
    .role-btn.comercial.selected,
    .role-btn.comercial:hover { border-color: rgba(139,92,246,.5); color: #fff; }
    body.light .role-btn.admin.selected,
    body.light .role-btn.admin:hover,
    body.light .role-btn.comercial.selected,
    body.light .role-btn.comercial:hover { color: var(--text); }

    .role-btn .role-icon { font-size: 24px; line-height: 1; }
    .role-btn .role-name { font-weight: 800; font-size: 13px; letter-spacing: -.01em; }
    .role-btn .role-desc { font-size: 11px; color: var(--muted2); text-align: center; line-height: 1.3; }

    .role-btn.selected .role-check { display: flex; }
    .role-check {
      display: none;
      position: absolute;
      top: 8px; right: 8px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--blue);
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #fff;
      font-weight: 900;
    }
    .role-btn.comercial.selected .role-check { background: var(--violet); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(2,6,23,.5);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      outline: none;
      font-family: 'DM Sans', sans-serif;
      transition: .2s ease;
    }
    body.light .field input { border-color: var(--border); background: var(--panel-2); }
    .field input::placeholder { color: var(--muted2); font-weight: 400; }
    .field input:focus {
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .submit-btn {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1px solid rgba(37,99,235,.45);
      background: linear-gradient(180deg, var(--blue), #1d4ed8);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
      box-shadow: 0 8px 24px rgba(37,99,235,.2);
      margin-top: 20px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: .01em;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.1), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(37,99,235,.3);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn.violet {
      background: linear-gradient(180deg, var(--violet), #7c3aed);
      border-color: rgba(139,92,246,.45);
      box-shadow: 0 8px 24px rgba(139,92,246,.2);
    }
    .submit-btn.violet:hover { box-shadow: 0 12px 32px rgba(139,92,246,.3); }

    .alert {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 14px;
      display: none;
      animation: fadeIn .2s ease;
    }
    .alert.error {
      background: rgba(220,38,38,.12);
      border: 1px solid rgba(220,38,38,.3);
      color: #fca5a5;
    }
    body.light .alert.error {
      background: rgba(220,38,38,.08);
      border-color: rgba(220,38,38,.25);
      color: #b91c1c;
    }
    .alert.success {
      background: rgba(16,185,129,.12);
      border: 1px solid rgba(16,185,129,.3);
      color: #6ee7b7;
    }
    body.light .alert.success {
      background: rgba(16,185,129,.08);
      border-color: rgba(16,185,129,.25);
      color: #047857;
    }
    .alert.show { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.06);
    }
    body.light .divider::before,
    body.light .divider::after { background: var(--border); }
    .divider span { font-size: 11px; color: var(--muted2); }

    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted2);
      animation: fadeUp .6s ease both .25s;
      position: relative;
      z-index: 1;
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .panel { display: none; }
    .panel.active { display: block; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
      animation: fadeDown .6s ease both .05s;
      position: relative;
      z-index: 1;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--emerald);
      box-shadow: 0 0 0 3px rgba(16,185,129,.15);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%   { transform: scale(.9); opacity: .9; }
      50%  { transform: scale(1.15); opacity: .6; }
      100% { transform: scale(.9); opacity: .9; }
    }

    .field-wrap { position: relative; }
    .field-wrap input { padding-right: 40px; }
    .toggle-pwd {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
      line-height: 1;
    }
    .toggle-pwd:hover { color: var(--muted); }

    .mono {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: .04em;
    }

    .theme-toggle:focus-visible,
    .tab:focus-visible,
    .role-btn:focus-visible,
    .submit-btn:focus-visible,
    .toggle-pwd:focus-visible,
    .footer a:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
      border-radius: 8px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    @media (max-width: 380px) {
      body { padding-left: 16px; padding-right: 16px; }
      .form-body { padding: 20px; }
      .role-selector { gap: 6px; }
      .role-btn { padding: 12px 8px; }
      .logo { width: 42px; height: 42px; font-size: 19px; }
      .brand-text .name { font-size: 21px; }
      .brand { gap: 12px; margin-bottom: 24px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <button class="theme-toggle" id="themeToggle" type="button" role="switch" aria-checked="false" aria-label="Cambiar tema">
    <span class="theme-toggle-thumb">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4.2"/>
        <line x1="12" y1="1.5" x2="12" y2="4"/>
        <line x1="12" y1="20" x2="12" y2="22.5"/>
        <line x1="1.5" y1="12" x2="4" y2="12"/>
        <line x1="20" y1="12" x2="22.5" y2="12"/>
        <line x1="4.2" y1="4.2" x2="6" y2="6"/>
        <line x1="18" y1="18" x2="19.8" y2="19.8"/>
        <line x1="4.2" y1="19.8" x2="6" y2="18"/>
        <line x1="18" y1="6" x2="19.8" y2="4.2"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 3a9 9 0 108.485 12.02A7 7 0 0112 3z"/>
      </svg>
    </span>
  </button>

  <div class="brand">
    <div class="logo">W</div>
    <div class="brand-text">
      <div class="name">WINALLCONTROL</div>
      <div class="tag">Plataforma de gestión comercial</div>
    </div>
  </div>

  <div class="status-bar">
    <span class="dot"></span>
    <span>Sistema operativo · <span class="mono">v1.0</span></span>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-tab="login">Iniciar sesión</button>
      <button class="tab" data-tab="register">Crear cuenta</button>
    </div>

    <div class="form-body panel active" id="panel-login">
      <div class="form-title">Bienvenido de nuevo</div>
      <div class="form-subtitle">Ingresá tus credenciales y seleccioná tu rol para continuar.</div>

      <div class="role-label">Tu rol</div>
      <div class="role-selector" id="login-roles">
        <button class="role-btn admin" data-role="admin">
          <div class="role-check">✓</div>
          <div class="role-name">Admin</div>
          <div class="role-desc">Control global y dirección</div>
        </button>
        <button class="role-btn comercial" data-role="comercial">
          <div class="role-check">✓</div>
          <div class="role-name">Comercial</div>
          <div class="role-desc">Gestión de visitas y leads</div>
        </button>
      </div>

      <div class="field">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="tu@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="field-wrap">
          <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pwd" onclick="togglePwd('login-password', this)" tabindex="-1">Show</button>
        </div>
      </div>

      <div class="alert" id="login-alert"></div>

      <button class="submit-btn" id="login-btn" onclick="handleLogin()">
        Ingresar al sistema
      </button>
    </div>

    <div class="form-body panel" id="panel-register">
      <div class="form-title">Crear cuenta</div>
      <div class="form-subtitle">Completá los datos y elegí tu rol dentro de Wincontrol.</div>

      <div class="role-label">Tu rol</div>
      <div class="role-selector" id="register-roles">
        <button class="role-btn admin" data-role="admin">
          <div class="role-check">✓</div>
          <div class="role-name">Admin</div>
          <div class="role-desc">Control global y dirección</div>
        </button>
        <button class="role-btn comercial" data-role="comercial">
          <div class="role-check">✓</div>
          <div class="role-name">Comercial</div>
          <div class="role-desc">Gestión de visitas y leads</div>
        </button>
      </div>

      <div class="field">
        <label>Nombre completo</label>
        <input id="reg-name" type="text" placeholder="Ej: María García" autocomplete="name" />
      </div>

      <div class="field">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="tu@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="field-wrap">
          <input id="reg-password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
          <button class="toggle-pwd" onclick="togglePwd('reg-password', this)" tabindex="-1">Show</button>
        </div>
      </div>

      <div class="field">
        <label>Confirmar contraseña</label>
        <div class="field-wrap">
          <input id="reg-password2" type="password" placeholder="Repetí tu contraseña" autocomplete="new-password" />
          <button class="toggle-pwd" onclick="togglePwd('reg-password2', this)" tabindex="-1">Show</button>
        </div>
      </div>

      <div class="alert" id="register-alert"></div>

      <button class="submit-btn" id="register-btn" onclick="handleRegister()">
        Crear cuenta
      </button>
    </div>
  </div>

  <div class="footer">
    Wincontrol · Control operativo &nbsp;·&nbsp;
    <a href="#">Soporte</a>
  </div>

  <script src="./config.js"></script>

  <script>
    const THEME_KEY = 'wc-theme';
    const themeToggle = document.getElementById('themeToggle');

    function applyTheme(theme) {
      document.body.classList.toggle('light', theme === 'light');
      themeToggle.setAttribute('aria-checked', theme === 'light');
    }

    applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

    themeToggle.addEventListener('click', () => {
      const next = document.body.classList.contains('light') ? 'dark' : 'light';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    const selectedRole = { login: null, register: null };

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    function setupRoles(containerId, key) {
      const container = document.getElementById(containerId);
      container.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedRole[key] = btn.dataset.role;

          const submitId = key === 'login' ? 'login-btn' : 'register-btn';
          const submitBtn = document.getElementById(submitId);
          if (btn.dataset.role === 'admin') {
            submitBtn.classList.remove('violet');
          } else {
            submitBtn.classList.add('violet');
          }
        });
      });
    }

    setupRoles('login-roles', 'login');
    setupRoles('register-roles', 'register');

    function togglePwd(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    }

    function showAlert(id, msg, type = 'error') {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }
    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert';
      el.textContent = '';
    }

    const ROUTES = {
      admin: '../admin/',
      comercial: '../comercial/'
    };

    function redirectTo(role) {
      const url = ROUTES[role];
      document.querySelector('.card').style.transition = 'opacity .3s ease, transform .3s ease';
      document.querySelector('.card').style.opacity = '0';
      document.querySelector('.card').style.transform = 'translateY(-8px)';
      document.querySelector('.brand').style.transition = 'opacity .3s ease';
      document.querySelector('.brand').style.opacity = '0';
      setTimeout(() => { window.location.href = url; }, 320);
    }

    async function handleLogin() {
      clearAlert('login-alert');

      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const role     = selectedRole.login;

      if (!role) {
        showAlert('login-alert', 'Seleccioná tu rol antes de continuar.');
        return;
      }
      if (!email) {
        showAlert('login-alert', 'Ingresá tu email.');
        return;
      }
      if (!password) {
        showAlert('login-alert', 'Ingresá tu contraseña.');
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<span class="spinner"></span>Verificando...';
      btn.disabled = true;

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Credenciales incorrectas');
        localStorage.setItem('wc_token', data.token);
        localStorage.setItem('wc_role', role);
        localStorage.setItem('wc_user', JSON.stringify(data.user));

        showAlert('login-alert', `Acceso correcto. Redirigiendo...`, 'success');
        setTimeout(() => redirectTo(role), 700);

      } catch (err) {
        showAlert('login-alert', ` ${err.message}`);
        btn.innerHTML = 'Ingresar al sistema';
        btn.disabled = false;
      }
    }

    async function handleRegister() {
      clearAlert('register-alert');

      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pwd1  = document.getElementById('reg-password').value;
      const pwd2  = document.getElementById('reg-password2').value;
      const role  = selectedRole.register;

      if (!role) {
        showAlert('register-alert', 'Seleccioná tu rol.');
        return;
      }
      if (!name) {
        showAlert('register-alert', 'Ingresá tu nombre completo.');
        return;
      }
      if (!email || !email.includes('@')) {
        showAlert('register-alert', 'Ingresá un email válido.');
        return;
      }
      if (pwd1.length < 6) {
        showAlert('register-alert', 'La contraseña debe tener al menos 6 caracteres.');
        return;
      }
      if (pwd1 !== pwd2) {
        showAlert('register-alert', 'Las contraseñas no coinciden.');
        return;
      }

      const btn = document.getElementById('register-btn');
      btn.innerHTML = '<span class="spinner"></span>Creando cuenta...';
      btn.disabled = true;

      try {

        const res = await fetch(`${CONFIG.API_URL}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password: pwd1, role })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Error al crear la cuenta');
        localStorage.setItem('wc_token', data.token);
        localStorage.setItem('wc_role', role);
        localStorage.setItem('wc_user', JSON.stringify(data.user));
        showAlert('register-alert', `Cuenta creada. Redirigiendo...`, 'success');
        setTimeout(() => redirectTo(role), 700);

      } catch (err) {
        showAlert('register-alert', `${err.message}`);
        btn.innerHTML = 'Crear cuenta';
        btn.disabled = false;
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('panel-login').classList.contains('active');
      if (loginActive) handleLogin();
      else handleRegister();
    });
  </script>
</body>
</html>
